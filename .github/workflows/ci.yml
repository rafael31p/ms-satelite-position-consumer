## CI/CD pipeline: build nativo en GitHub Actions, deploy ligero en Azure VM.
## La VM solo ejecuta docker pull + run — sin compilación GraalVM en producción.

name: CI build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw verify -B

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch

      - name: Build native image and push to GHCR
        id: build-push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            QUARKUS_PROFILE=prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      AZURE_VM: ${{ secrets.AZURE_VM }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      INFINISPAN_USER: ${{ secrets.INFINISPAN_USER }}
      INFINISPAN_PASSWORD: ${{ secrets.INFINISPAN_PASSWORD }}

    steps:
      - name: Deploy to Azure VM
        run: |
          IMAGE_TAG=$(echo "${{ needs.build-and-push.outputs.image_tag }}" | head -n 1)

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $AZURE_VM >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_rsa rafael31p@$AZURE_VM \
            IMAGE_TAG="$IMAGE_TAG" \
            REGISTRY="${{ env.REGISTRY }}" \
            GITHUB_ACTOR="${{ github.actor }}" \
            GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            INFINISPAN_USER="$INFINISPAN_USER" \
            INFINISPAN_PASSWORD="$INFINISPAN_PASSWORD" \
            'bash -s' << 'EOF'
              set -e

              echo "🔐 Autenticando en el registry..."
              echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "$GITHUB_ACTOR" --password-stdin

              echo "📥 Descargando nueva imagen..."
              docker pull "$IMAGE_TAG"

              echo "🛑 Deteniendo contenedor anterior si existe..."
              docker stop quarkus-container || true
              docker rm quarkus-container || true

              echo "🚀 Desplegando nueva imagen..."
              docker run -d \
                --name quarkus-container \
                --network quasar-net \
                -p 8080:8080 \
                --restart unless-stopped \
                -e INFINISPAN_USER="$INFINISPAN_USER" \
                -e INFINISPAN_PASSWORD="$INFINISPAN_PASSWORD" \
                "$IMAGE_TAG"

              echo "✅ Despliegue completado. Imagen: $IMAGE_TAG"
          EOF
