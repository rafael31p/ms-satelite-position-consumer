apiVersion: apps/v1
kind: Deployment
metadata:
  name: position-consumer
  namespace: quasar-fire
  labels:
    app: position-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: position-consumer
  template:
    metadata:
      labels:
        app: position-consumer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/q/metrics"
    spec:
      containers:
        - name: consumer
          image: ghcr.io/rafael31p/ms-satelite-position-consumer:main
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: QUARKUS_INFINISPAN_CLIENT_SERVER_LIST
              value: "infinispan-0.infinispan.quasar-fire.svc.cluster.local:11222"
            - name: INFINISPAN_USER
              valueFrom:
                secretKeyRef:
                  name: infinispan-credentials
                  key: username
            - name: INFINISPAN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infinispan-credentials
                  key: password
            - name: QUARKUS_INFINISPAN_CLIENT_CLIENT_INTELLIGENCE
              value: "BASIC"
            - name: QUARKUS_INFINISPAN_CLIENT_SASL_MECHANISM
              value: "DIGEST-MD5"
            - name: QUARKUS_INFINISPAN_CLIENT_USE_AUTH
              value: "true"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /q/health/started
              port: 8080
            failureThreshold: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: position-consumer
  namespace: quasar-fire
spec:
  selector:
    app: position-consumer
  ports:
    - port: 8080
      targetPort: 8080
      name: http
