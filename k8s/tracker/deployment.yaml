apiVersion: apps/v1
kind: Deployment
metadata:
  name: satellite-tracker
  namespace: quasar-fire
  labels:
    app: satellite-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: satellite-tracker
  template:
    metadata:
      labels:
        app: satellite-tracker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/q/metrics"
    spec:
      containers:
        - name: tracker
          image: ghcr.io/rafael31p/ms-satellite-tracker:main
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: QUARKUS_HTTP_PORT
              value: "8081"
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: "jdbc:postgresql://postgresql-0.postgresql.quasar-fire.svc.cluster.local:5432/satellite_tracker"
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_USER
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: POSTGRES_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-0.kafka.quasar-fire.svc.cluster.local:9092"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: satellite-tracker
  namespace: quasar-fire
spec:
  selector:
    app: satellite-tracker
  ports:
    - port: 8081
      targetPort: 8081
      name: http
